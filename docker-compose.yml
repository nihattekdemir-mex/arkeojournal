version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arkeojournal_db
    environment:
      POSTGRES_DB: arkeojournal
      POSTGRES_USER: arkeojournal_user
      POSTGRES_PASSWORD: arkeojournal_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkeojournal_user -d arkeojournal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arkeojournal_network

volumes:
  postgres_data:
    driver: local

networks:
  arkeojournal_network:
    driver: bridge
