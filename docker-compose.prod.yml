version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arkeojournal_network

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: arkeojournal
      POSTGRES_USER: arkeojournal_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkeojournal_user -d arkeojournal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arkeojournal_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - arkeojournal_network

volumes:
  postgres_data:
    driver: local

networks:
  arkeojournal_network:
    driver: bridge
